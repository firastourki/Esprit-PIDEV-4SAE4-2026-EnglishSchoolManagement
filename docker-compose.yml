services:

  mysql:
    image: mysql:8
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: english_school_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  eureka-server:
    build: ./discovery-service
    image: esm-eureka-server:latest
    container_name: eureka-server
    restart: unless-stopped
    ports:
      - "8761:8761"

  resources-service:
    build: ./resources-service
    container_name: resources-service
    ports:
      - "5433:5432"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/english_school_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root

  assessment-service:
    build: ./assessment-service
    container_name: assessment-service
    ports:
      - "8095:8095"
    depends_on:
      auth-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    ports:
      - "1999:1999"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/english_school_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root

volumes:
  auth-db-data:
  auth-avatars:

networks:
  esm-net:
    driver: bridge