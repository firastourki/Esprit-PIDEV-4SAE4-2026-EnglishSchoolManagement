services:

  # ── 1. Eureka ──────────────────────────────────────────────────────────────
  eureka-server:
    build: ./discovery-service
    image: esm-eureka-server:latest
    container_name: eureka-server
    restart: unless-stopped
    ports:
      - "8761:8761"
    networks:
      - esm-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ── 2. Auth Database ────────────────────────────────────────────────────────
  auth-db:
    image: postgres:16-alpine
    container_name: auth-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: esmauthdb
      POSTGRES_USER: authserviceuser
      POSTGRES_PASSWORD: authservicedbp4ss
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    networks:
      - esm-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authserviceuser -d esmauthdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── 3. Auth Service ─────────────────────────────────────────────────────────
  auth-service:
    build: ./esmauthms
    image: esm-auth-service:latest
    container_name: auth-service
    restart: unless-stopped
    depends_on:
      auth-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    ports:
      - "1999:1999"
    environment:
      SPRING_APPLICATION_NAME: auth-service
      SPRING_DATASOURCE_URL: jdbc:postgresql://auth-db:5432/esmauthdb
      SPRING_DATASOURCE_USERNAME: authserviceuser
      SPRING_DATASOURCE_PASSWORD: authservicedbp4ss
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_EXPIRATION: 604800000
      APP_CORS_ALLOWED_ORIGINS: http://localhost:4200
      EUREKA_CLIENT_ENABLED: "true"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      EMAIL_SERVICE_URL: http://email-service:2001/api/emails/send
      APP_STORAGE_AVATAR_DIR: /app/avatars
    volumes:
      - auth-avatars:/app/avatars
    networks:
      - esm-net

volumes:
  auth-db-data:
  auth-avatars:

networks:
  esm-net:
    driver: bridge