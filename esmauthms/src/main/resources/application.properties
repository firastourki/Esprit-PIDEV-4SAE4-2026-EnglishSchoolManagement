# ============================================================
# APPLICATION
# ============================================================
spring.application.name=AUTH-SERVICE
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

server.port=1999
server.servlet.context-path=/api

app.cors.allowed-origins=http://localhost:4200
eureka.instance.prefer-ip-address=true

# ============================================================
# DATABASE - PostgreSQL (Docker)
# ============================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/esm_auth_db
spring.datasource.username=authserviceuser
spring.datasource.password=authservicedb@p4ss
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (HikariCP - default)
spring.datasource.hikari.pool-name=AuthHikariPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000

# ============================================================
# JPA / HIBERNATE
# ============================================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ============================================================
# JWT CONFIGURATION
# ============================================================
jwt.secret=mysupersecurejwtsecretkeymysupersecurejwtsecretkey
jwt.access-token-expiration=604800000
jwt.refresh-token-expiration=604800000

# ============================================================
# SECURITY
# ============================================================
spring.security.filter.order=10

# ============================================================
# SWAGGER / OPENAPI
# ============================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# ============================================================
# LOGGING
# ============================================================
logging.level.root=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=ERROR
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
