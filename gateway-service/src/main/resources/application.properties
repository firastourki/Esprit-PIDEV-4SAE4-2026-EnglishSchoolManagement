# ===============================
# SERVER
# ===============================
server.port=8080
spring.application.name=gateway-service

# ===============================
# EUREKA CLIENT
# ===============================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.ip-address=127.0.0.1

# ===============================
# ROUTES
# ===============================
spring.cloud.gateway.routes[0].id=assessment-service
spring.cloud.gateway.routes[0].uri=lb://ASSESSMENT-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/assessments/**

spring.cloud.gateway.routes[1].id=enums-service
spring.cloud.gateway.routes[1].uri=lb://ASSESSMENT-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/enums/**

spring.cloud.gateway.routes[2].id=resources-service
spring.cloud.gateway.routes[2].uri=lb://RESOURCES-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/resources/**

spring.cloud.gateway.routes[3].id=planning-service
spring.cloud.gateway.routes[3].uri=lb://ASSESSMENT-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/planning/**

spring.cloud.gateway.routes[4].id=auth-service
spring.cloud.gateway.routes[4].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.routes[5].id=notification-service
spring.cloud.gateway.routes[5].uri=lb://notification-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/messages/**

# ===============================
# ACTUATOR
# ===============================
management.endpoints.web.exposure.include=*
management.endpoint.gateway.enabled=true