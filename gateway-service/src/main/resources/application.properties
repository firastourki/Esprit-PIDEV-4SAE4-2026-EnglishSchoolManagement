# ===============================
# SERVER
# ===============================
server.port=8080
spring.application.name=gateway-service

# ===============================
# EUREKA CLIENT
# ===============================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.ip-address=127.0.0.1

# ===============================
# ROUTES
# ===============================

# --- Assessment Service (port 8081) ---
spring.cloud.gateway.server.webflux.routes[0].id=assessment-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://ASSESSMENT-SERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/assessments/**

spring.cloud.gateway.server.webflux.routes[1].id=enums-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://ASSESSMENT-SERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/enums/**

# --- Resources Service (port 8096) ---
spring.cloud.gateway.server.webflux.routes[2].id=resources-service
spring.cloud.gateway.server.webflux.routes[2].uri=lb://RESOURCES-SERVICE
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/resources/**

# --- Attendance Service ---
spring.cloud.gateway.server.webflux.routes[3].id=attendance-service
spring.cloud.gateway.server.webflux.routes[3].uri=lb://ATTENDANCE-SERVICE
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/attendances/**

# --- Schedule Service (port 8888) ---
spring.cloud.gateway.server.webflux.routes[4].id=schedule-service
spring.cloud.gateway.server.webflux.routes[4].uri=lb://SCHEDULE-SERVICE
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/api/schedules/**

# --- Planning Service ---
spring.cloud.gateway.server.webflux.routes[5].id=planning-service
spring.cloud.gateway.server.webflux.routes[5].uri=lb://PLANNING-SERVICE
spring.cloud.gateway.server.webflux.routes[5].predicates[0]=Path=/api/planning/**

# ===============================
# ACTUATOR
# ===============================
management.endpoints.web.exposure.include=*