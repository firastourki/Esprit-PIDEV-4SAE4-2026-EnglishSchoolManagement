# ===============================
# SERVER
# ===============================
server.port=8080
spring.application.name=gateway-service


# ===============================
# EUREKA CLIENT
# ===============================
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true


# ===============================
# ROUTES
# ===============================


# --- Auth Service (port 1999) ---
spring.cloud.gateway.server.webflux.routes[0].id=auth-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/auth,/api/auth/**,/api/users,/api/users/**


# --- Assessment Service (port 8081) ---
spring.cloud.gateway.server.webflux.routes[1].id=assessment-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://ASSESSMENT-SERVICE
